<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creature Gallery</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./gallery.css" />
  </head>
  <body>
    <main class="gallery-app">
      <header class="gallery-top">
        <h1>LIVE SUBMISSION WALL</h1>
        <div class="gallery-actions">
          <button id="clear-wall" type="button">REFRESH WALL</button>
          <a href="./" target="_blank" rel="noopener">OPEN COMPOSER</a>
        </div>
      </header>
      <div id="gallery-count" class="gallery-count">0 SAVED CREATURES</div>
      <section id="gallery-grid" class="gallery-grid" aria-label="Submitted creatures"></section>
    </main>
    <script src="./gallery.js" type="module"></script>
  </body>
</html>
